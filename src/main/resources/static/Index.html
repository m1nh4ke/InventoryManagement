<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống quản lý kho hàng WMSVN</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* ── RESET & ROOT ─────────────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }


        :root {
            --bg: #0f1117;
            --bg2: #181c27;
            --bg3: #1e2335;
            --border: #2a3047;
            --accent: #4f8ef7;
            --accent2: #38d9a9;
            --accent3: #f7a94f;
            --danger: #f7604f;
            --text: #e8eaf2;
            --muted: #7a849e;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, .35);
            --radius: 12px;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        /* ── SIDEBAR ──────────────────────────────────────────────────────────────── */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 230px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform .3s;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -.3px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .sidebar-nav {
            flex: 1;
            padding: 14px 10px;
            overflow-y: auto;
        }

        .nav-section {
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 10px 10px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all .18s;
            margin-bottom: 2px;
        }

        .nav-item i {
            width: 18px;
            text-align: center;
            font-size: 14px;
        }

        .nav-item:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .nav-item.active {
            background: rgba(79, 142, 247, .15);
            color: var(--accent);
        }

        .nav-item .badge {
            margin-left: auto;
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 10px;
            padding: 1px 6px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .user-role {
            font-size: 11px;
            color: var(--muted);
        }

        /* ── MAIN ─────────────────────────────────────────────────────────────────── */
        .main {
            margin-left: 230px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left .3s ease;
        }

        .topbar {
            height: 58px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .page-title {
            font-size: 17px;
            font-weight: 700;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn-top {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            transition: all .18s;
        }

        .icon-btn-top:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        .content {
            flex: 1;
            padding: 28px;
        }

        /* ── STAT CARDS ───────────────────────────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .stat-card.blue::before {
            background: var(--accent);
        }

        .stat-card.green::before {
            background: var(--accent2);
        }

        .stat-card.orange::before {
            background: var(--accent3);
        }

        .stat-card.red::before {
            background: var(--danger);
        }

        .stat-card.purple::before {
            background: #b070ff;
        }

        .stat-card.teal::before {
            background: #12b886;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-bottom: 14px;
        }

        .stat-card.blue .stat-icon {
            background: rgba(79, 142, 247, .15);
            color: var(--accent);
        }

        .stat-card.green .stat-icon {
            background: rgba(56, 217, 169, .15);
            color: var(--accent2);
        }

        .stat-card.orange .stat-icon {
            background: rgba(247, 169, 79, .15);
            color: var(--accent3);
        }

        .stat-card.red .stat-icon {
            background: rgba(247, 96, 79, .15);
            color: var(--danger);
        }

        .stat-card.purple .stat-icon {
            background: rgba(176, 112, 255, .15);
            color: #b070ff;
        }

        .stat-card.teal .stat-icon {
            background: rgba(18, 184, 134, .15);
            color: #12b886;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ── SECTION ──────────────────────────────────────────────────────────────── */
        .section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--accent);
        }

        .section-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ── TOOLBAR ──────────────────────────────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            flex: 1;
            min-width: 200px;
            transition: border-color .18s;
        }

        .search-box:focus-within {
            border-color: var(--accent);
        }

        .search-box i {
            color: var(--muted);
            font-size: 13px;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            width: 100%;
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        /* ── BUTTONS ──────────────────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            transition: all .18s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #3a7de8;
            box-shadow: 0 4px 14px rgba(79, 142, 247, .35);
        }

        .btn-success {
            background: var(--accent2);
            color: #0f1117;
        }

        .btn-success:hover {
            background: #2bc99a;
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: #e54b3a;
        }

        .btn-ghost {
            background: var(--bg3);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        /* ── TABLE ────────────────────────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--bg3);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .7px;
            white-space: nowrap;
        }

        td {
            padding: 13px 16px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background .15s;
        }

        tbody tr:hover td {
            background: rgba(255, 255, 255, .02);
        }

        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }

        .fw600 {
            font-weight: 600;
        }

        /* ── PILLS ────────────────────────────────────────────────────────────────── */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 600;
        }

        .pill-active {
            background: rgba(56, 217, 169, .12);
            color: var(--accent2);
        }

        .pill-inactive {
            background: rgba(122, 132, 158, .12);
            color: var(--muted);
        }

        .pill-low {
            background: rgba(247, 169, 79, .12);
            color: var(--accent3);
        }

        .pill-out {
            background: rgba(247, 96, 79, .12);
            color: var(--danger);
        }

        .pill-in {
            background: rgba(56, 217, 169, .12);
            color: var(--accent2);
        }

        .pill-adjustment {
            background: rgba(79, 142, 247, .12);
            color: var(--accent);
        }

        .pill-return {
            background: rgba(247, 169, 79, .12);
            color: var(--accent3);
        }

        /* ── ACTION BTNS ──────────────────────────────────────────────────────────── */
        .action-cell {
            display: flex;
            gap: 6px;
        }

        .act-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            transition: all .18s;
        }

        .act-btn.edit:hover {
            background: rgba(79, 142, 247, .15);
            color: var(--accent);
            border-color: var(--accent);
        }

        .act-btn.del:hover {
            background: rgba(247, 96, 79, .15);
            color: var(--danger);
            border-color: var(--danger);
        }

        .act-btn.view:hover {
            background: rgba(56, 217, 169, .15);
            color: var(--accent2);
            border-color: var(--accent2);
        }

        /* ── MODAL ────────────────────────────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            z-index: 500;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.open {
            display: flex;
            animation: fadeIn .2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 520px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp .22s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            font-size: 14px;
            transition: all .15s;
        }

        .modal-close:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        /* ── FORM ─────────────────────────────────────────────────────────────────── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.span2 {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        input,
        select,
        textarea {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 13px;
            color: var(--text);
            font-family: inherit;
            font-size: 13.5px;
            outline: none;
            transition: border-color .18s;
            width: 100%;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
        }

        select option {
            background: var(--bg2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* ── PAGINATION ───────────────────────────────────────────────────────────── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 22px;
            border-top: 1px solid var(--border);
        }

        .pagination-info {
            font-size: 12px;
            color: var(--muted);
        }

        .page-btns {
            display: flex;
            gap: 4px;
        }

        .page-btn {
            width: 32px;
            height: 32px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--muted);
            transition: all .18s;
        }

        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .page-btn:hover:not(.active) {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── TOAST ────────────────────────────────────────────────────────────────── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .4);
            font-size: 13.5px;
            font-weight: 500;
            animation: toastIn .3s ease;
            min-width: 260px;
        }

        .toast.success {
            border-color: var(--accent2);
        }

        .toast.error {
            border-color: var(--danger);
        }

        .toast i {
            font-size: 16px;
        }

        .toast.success i {
            color: var(--accent2);
        }

        .toast.error i {
            color: var(--danger);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── LOADER ───────────────────────────────────────────────────────────────── */
        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 14px;
            opacity: .4;
            display: block;
        }

        /* ── TABS ─────────────────────────────────────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            padding: 0 22px;
        }

        .tab {
            padding: 12px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all .18s;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ── DASHBOARD SPECIFICS ──────────────────────────────────────────────────── */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 22px;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .act-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .act-dot.in {
            background: var(--accent2);
        }

        .act-dot.out {
            background: var(--danger);
        }

        .act-dot.adjust {
            background: var(--accent);
        }

        .act-dot.return {
            background: var(--accent3);
        }

        .act-text {
            font-size: 13px;
            line-height: 1.5;
        }

        .act-time {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 2px;
        }

        .low-stock-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 22px;
            border-bottom: 1px solid var(--border);
        }

        .low-stock-item:last-child {
            border-bottom: none;
        }

        .ls-bar-wrap {
            width: 80px;
        }

        .ls-bar {
            height: 4px;
            background: var(--bg3);
            border-radius: 2px;
            overflow: hidden;
        }

        .ls-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--danger), var(--accent3));
        }

        .ls-qty {
            font-size: 12px;
            font-weight: 700;
            color: var(--danger);
            margin-top: 3px;
        }

            width: 100%;
            height: 100%;

            z-index: 1;

            width: 100% !important;
            height: 100% !important;

        }

        #scanner-reader canvas {

        .scanner-scrim {
            position: absolute;
            inset: 0;
            z-index: 3;

        .scanner-box {

    <script>
        // ── CONFIG ───────────────────────────────────────────────────────────────────
        const API = 'http://localhost:8080/api';
        let currentPage = 'dashboard';
        let role = 'ROLE_STAFF';

        // ── API HELPER ───────────────────────────────────────────────────────────────
        async function api(path, method = 'GET', body = null) {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            const opts = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            };
            if (body) opts.body = JSON.stringify(body);
            try {
                const res = await fetch(API + path, opts);
                if (res.status === 401) {
                    logout();
                    return;
                }
                if (res.status === 403) {
                    toast('Access Denied: You do not have permission.', 'error');
                    return;
                }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: 'Request failed' }));
                    throw new Error(err.error || 'Request failed');
                }
                if (res.status === 204) return null;
                return await res.json();
            } catch (e) {
                if (e.name === 'TypeError') throw new Error('Cannot connect to server. Make sure Spring Boot is running on port 8080.');
                throw e;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }

        // ── INITIALIZATION ───────────────────────────────────────────────────────────
        (function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            const username = localStorage.getItem('username') || 'User';
            role = localStorage.getItem('role') || 'ROLE_STAFF';

            document.getElementById('user-display-name').textContent = username;
            document.getElementById('user-initials').textContent = username.substring(0, 2).toUpperCase();

            const roleMap = {
                'ROLE_ADMIN': 'ADMIN',
                'ROLE_MANAGER': 'QUẢN LÝ',
                'ROLE_STAFF': 'NHÂN VIÊN',
                'ADMIN': 'ADMIN',
                'MANAGER': 'QUẢN LÝ',
                'STAFF': 'NHÂN VIÊN'
            };
            document.getElementById('user-display-role').textContent = roleMap[role] || role.replace('ROLE_', '');

            // Reset all sidebar nav items to visible
            const elements = ['nav-dashboard', 'nav-products', 'nav-mgmt-section', 'nav-categories', 'nav-suppliers', 'nav-requests', 'nav-invoices', 'nav-stock', 'nav-sys-section', 'nav-users'];
            elements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = '';
            });

            // Role-based UI filtering
            if (role === 'ROLE_STAFF') {
                document.getElementById('nav-dashboard').style.display = 'none';
                document.getElementById('nav-stock').style.display = 'none';
                document.getElementById('nav-users').style.display = 'none';
                document.getElementById('nav-sys-section').style.display = 'none';
            } else if (role === 'ROLE_MANAGER') {
                document.getElementById('nav-users').style.display = 'none';
                document.getElementById('nav-sys-section').style.display = 'none';
            } else if (role === 'ROLE_ADMIN') {
                document.getElementById('nav-dashboard').style.display = 'none';
                document.getElementById('nav-products').style.display = 'none';
                document.getElementById('nav-mgmt-section').style.display = 'none';
                document.getElementById('nav-categories').style.display = 'none';
                document.getElementById('nav-suppliers').style.display = 'none';
                document.getElementById('nav-requests').style.display = 'none';
                document.getElementById('nav-invoices').style.display = 'none';
                document.getElementById('nav-stock').style.display = 'none';
            }
        })();

        // ── TOAST ────────────────────────────────────────────────────────────────────
        function toast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type === 'success' ? 'circle-check' : 'circle-xmark'}"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        // ── MODAL ────────────────────────────────────────────────────────────────────
        function openModal(title, body, footer) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-footer').innerHTML = footer;
            document.getElementById('modal').classList.add('open');
        }
        function closeModal() { document.getElementById('modal').classList.remove('open'); }
        document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

        // ── NAVIGATION ───────────────────────────────────────────────────────────────
        function showPage(page) {
            const role = localStorage.getItem('role') || 'ROLE_STAFF';
            const allowedPages = {
                'ROLE_ADMIN': ['users'],
                'ROLE_MANAGER': ['dashboard', 'products', 'categories', 'suppliers', 'requests', 'stock', 'invoices'],
                'ROLE_STAFF': ['products', 'categories', 'suppliers', 'requests', 'invoices']
            };

            const allowed = allowedPages[role] || allowedPages['ROLE_STAFF'];
            if (!allowed.includes(page)) {
                toast('Truy cập bị từ chối: Bạn không có quyền xem trang này.', 'error');
                if (role === 'ROLE_ADMIN') page = 'users';
                else if (role === 'ROLE_STAFF') page = 'requests';
                else page = 'dashboard';
            }

            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => {
                if (el.getAttribute('onclick')?.includes(page)) el.classList.add('active');
            });
            const titles = {
                dashboard: 'Dashboard', products: 'Sản phẩm', categories: 'Danh mục',
                suppliers: 'Nhà cung cấp', stock: 'Lịch sử kho', users: 'Người dùng', requests: 'Yêu cầu Nhập/Xuất', invoices: 'Quản lý Hóa đơn'
            };
            document.getElementById('page-title').textContent = titles[page] || page;
            const pages = { dashboard, products, categories, suppliers, stock, users, requests, invoices };
            if (pages[page]) pages[page]();
        }
        function reloadPage() { showPage(currentPage); }

        // ─────────────────────────────────────────────────────────────────────────────
        // DASHBOARD
        // ─────────────────────────────────────────────────────────────────────────────
        async function dashboard() {
            document.getElementById('content').innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
            try {
                const [products, categories, suppliers, movements, requests] = await Promise.all([
                    api('/products'), api('/categories'), api('/suppliers'), api('/stock-movements'), api('/stock-requests')
                ]);
                const lowStock = products.filter(p => p.quantity <= p.minStockLevel);
                const outOfStock = products.filter(p => p.quantity === 0);

                // Update sidebar badge
                const badge = document.getElementById('low-stock-badge');
                if (lowStock.length > 0) { badge.textContent = lowStock.length; badge.style.display = ''; }

                const recentMovements = movements.slice(0, 8);

                const pendingRequests = requests.filter(r => r.status === 'PENDING').length;
                const approvedRequests = requests.filter(r => r.status === 'APPROVED').length;

                // Compute Category Distribution (by quantity)
                const catQtyMap = {};
                products.forEach(p => {
                    const catName = p.category?.name || 'Chưa phân loại';
                    const qty = p.quantity || 0;
                    if (qty > 0) catQtyMap[catName] = (catQtyMap[catName] || 0) + qty;
                });
                const catQtyLabels = Object.keys(catQtyMap);
                const catQtyData = Object.values(catQtyMap);

                // Compute Stock Movement Trends (last 30 days)
                const last30Days = [...Array(30)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (29 - i));
                    return d.toISOString().split('T')[0];
                });
                const trendIn = Array(30).fill(0);
                const trendOut = Array(30).fill(0);

                movements.forEach(m => {
                    if (!m.createdAt) return;
                    const dateStr = m.createdAt.split('T')[0];
                    const idx = last30Days.indexOf(dateStr);
                    if (idx !== -1) {
                        if (m.type === 'IN' || m.type === 'RETURN') trendIn[idx] += m.quantity;
                        if (m.type === 'OUT') trendOut[idx] += m.quantity;
                    }
                });
                const trendLabels = last30Days.map(d => {
                    const parts = d.split('-');
                    return `${parts[2]}/${parts[1]}`;
                });

                document.getElementById('content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-icon"><i class="fas fa-box"></i></div>
          <div class="stat-label">Tổng sản phẩm</div>
          <div class="stat-value">${products.length}</div>
          <div class="stat-sub">${outOfStock.length} hết hàng</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon"><i class="fas fa-tags"></i></div>
          <div class="stat-label">Danh mục</div>
          <div class="stat-value">${categories.length}</div>
          <div class="stat-sub">Nhóm sản phẩm</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon"><i class="fas fa-truck"></i></div>
          <div class="stat-label">Nhà cung cấp</div>
          <div class="stat-value">${suppliers.length}</div>
          <div class="stat-sub">${suppliers.filter(s => s.isActive).length} hoạt động</div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon"><i class="fas fa-triangle-exclamation"></i></div>

        async function saveProduct(id) {
            const minVal = parseInt(document.getElementById('f-min').value);
            const maxVal = parseInt(document.getElementById('f-max').value);
            if (isNaN(minVal) || minVal < 0) {
                toast('Định mức tối thiểu phải là số nguyên >= 0', 'error');
                return;
            }
            if (isNaN(maxVal) || maxVal < 0) {
                toast('Định mức tối đa phải là số nguyên >= 0', 'error');
                return;
            }

            const body = {
                sku: document.getElementById('f-sku').value,
                name: document.getElementById('f-name').value,
                description: document.getElementById('f-desc').value,
                quantity: 0,
                minStockLevel: minVal,
                maxStockLevel: maxVal,
                unit: document.getElementById('f-unit').value || 'piece',
            };
            const catId = document.getElementById('f-cat').value;
            const supId = document.getElementById('f-sup').value;
            const params = `${catId ? `?categoryId=${catId}` : ''}${supId ? `${catId ? '&' : '?'}supplierId=${supId}` : ''}`;
            try {
                if (id) await api(`/products/${id}${params}`, 'PUT', body);
                else await api(`/products${params}`, 'POST', body);
                toast(id ? 'Đã cập nhật sản phẩm thành công!' : 'Đã tạo sản phẩm thành công!');
                closeModal(); products();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function deleteProduct(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')) return;
            try { await api(`/products/${id}`, 'DELETE'); toast('Đã xóa sản phẩm thành công!'); products(); }
            catch (e) { toast(e.message, 'error'); }
        }

            const userId = parseInt(document.getElementById('sm-uid').value) || 1;
            const reason = document.getElementById('sm-reason').value;
            const endpoints = {

                        (m.reason && m.reason.toLowerCase().includes(keyword.toLowerCase()))
                    );
                }
                const counts = {
                    ALL: data.length, IN: data.filter(m => m.type === 'IN').length,
                    OUT: data.filter(m => m.type === 'OUT').length,
                    ADJUSTMENT: data.filter(m => m.type === 'ADJUSTMENT').length,
                    RETURN: data.filter(m => m.type === 'RETURN').length
                };

                const names = {
                    ALL: 'Tất cả', IN: 'Nhập kho', OUT: 'Xuất kho',

        </div>
        <div class="tabs">
          ${['ALL', 'IN', 'OUT', 'ADJUSTMENT', 'RETURN'].map(t =>
                    `<div class="tab ${typeFilter === t ? 'active' : ''}" onclick="stock('${t}', '${keyword}')">${names[t]} (${counts[t]})</div>`
                ).join('')}
        </div>
        <div class="toolbar">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Tìm kiếm theo sản phẩm hoặc lý do…" value="${keyword}"

          </div>
          <button class="btn btn-ghost" onclick="stock('${typeFilter}', document.getElementById('stock-search').value)">

          <thead><tr><th>#</th><th>Sản phẩm</th><th>Loại</th><th>Số lượng</th><th>Lý do</th><th>Thực hiện bởi</th><th>Ngày thực hiện</th></tr></thead>
          <tbody>
            ${filtered.length === 0 ? `<tr><td colspan="7"><div class="empty-state"><i class="fas fa-inbox"></i>Không tìm thấy biến động nào</div></td></tr>` :
                        filtered.map(m => {

        </table></div>

        async function saveGeneralStockMovement() {
            const productId = parseInt(document.getElementById('sm-gen-pid').value);
            const type = document.getElementById('sm-gen-type').value;
            const qty = parseInt(document.getElementById('sm-gen-qty').value);
            const userId = parseInt(document.getElementById('sm-gen-uid').value) || 1;
            const reason = document.getElementById('sm-gen-reason').value;

            if (!productId) { toast('Vui lòng chọn sản phẩm!', 'error'); return; }

            const endpoints = {
                in: '/stock-movements/stock-in', out: '/stock-movements/stock-out',
                adjust: '/stock-movements/adjust', return: '/stock-movements/return'
            };
            const body = type === 'adjust'
                ? { productId, userId, newQuantity: qty, reason }
                : { productId, userId, quantity: qty, reason };
            try {
                await api(endpoints[type], 'POST', body);
                toast('Đã lưu biến động kho thành công!'); closeModal(); stock();
            } catch (e) { toast(e.message, 'error'); }
        }

                    );
                }

                const counts = {
                    ALL: data.length,
                    PENDING: data.filter(r => r.status === 'PENDING').length,

              <th>Loại</th>
              <th>Nhân viên</th>

            ${filtered.length === 0 ? `<tr><td colspan="7"><div class="empty-state"><i class="fas fa-file-invoice"></i>Không tìm thấy hóa đơn nào</div></td></tr>` :
                        filtered.map(inv => {
                            const typeText = inv.type === 'IMPORT' ? 'Nhập kho' : 'Xuất kho';
                            const typeClass = inv.type === 'IMPORT' ? 'pill-in' : 'pill-return';
                            return `<tr>
                        <td class="mono">${inv.id}</td>
                        <td class="fw600">${inv.invoiceNo}</td>
                        <td class="mono">${inv.request?.id || '—'}</td>
                        <td><span class="pill ${typeClass}">${typeText}</span></td>
                        <td>${inv.user?.username || 'Hệ thống'}</td>
                        <td class="mono">${inv.createdAt ? inv.createdAt.substring(0, 16).replace('T', ' ') : '—'}</td>
                        <td><div class="action-cell">
                            <button class="btn btn-ghost btn-sm" onclick="viewInvoiceDetails(${inv.id})" style="margin-right:4px;"><i class="fas fa-eye"></i> Chi tiết</button>
                            <div class="act-btn view" onclick="downloadFile('/invoices/${inv.id}/export/pdf', 'hoa_don_${inv.invoiceNo}.pdf')" title="Tải PDF" style="display:inline-flex; margin-right: 4px;"><i class="fas fa-file-pdf"></i></div>
                            <div class="act-btn edit" onclick="downloadFile('/invoices/${inv.id}/export/excel', 'hoa_don_${inv.invoiceNo}.xlsx')" title="Tải Excel" style="display:inline-flex;"><i class="fas fa-file-excel"></i></div>
                        </div></td>
                      </tr>`;
                        }).join('')}
          </tbody>
        </table></div>
      </div>`;
            } catch (e) { showError(e.message); }
        }

        async function viewInvoiceDetails(id) {
            try {
                const inv = await api(`/invoices/${id}`);
                const itemsHtml = inv.items.map((item, idx) => `
                <tr>
                    <td style="text-align:center;">${idx + 1}</td>
                    <td><span class="mono">${item.product?.sku || '—'}</span></td>
                    <td class="fw600">${item.product?.name || '—'}</td>
                    <td style="text-align:center;"><strong>${item.quantity}</strong></td>
                </tr>
            `).join('');

                const bodyHtml = `
                <div style="font-size:13.5px; line-height:1.6;">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border);">
                        <div><strong>Số hóa đơn:</strong> ${inv.invoiceNo}</div>
                        <div><strong>Ngày tạo:</strong> ${inv.createdAt ? inv.createdAt.substring(0, 16).replace('T', ' ') : '—'}</div>
                        <div><strong>Loại:</strong> ${inv.type === 'IMPORT' ? 'Nhập kho' : 'Xuất kho'}</div>
                        <div><strong>Người tạo:</strong> ${inv.user?.username || 'Hệ thống'}</div>
                        <div><strong>Mã yêu cầu gốc:</strong> #${inv.request?.id || '—'}</div>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:50px; text-align:center;">STT</th>
                                    <th>SKU</th>
                                    <th>Tên sản phẩm</th>
                                    <th style="width:100px; text-align:center;">Số lượng</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${itemsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

                const footerHtml = `
                <button class="btn btn-ghost" onclick="closeModal()">Đóng</button>
                <button class="btn btn-primary" onclick="downloadFile('/invoices/${inv.id}/export/pdf', 'hoa_don_${inv.invoiceNo}.pdf')"><i class="fas fa-file-pdf"></i> Tải PDF</button>
            `;
                openModal(`Chi tiết hóa đơn ${inv.invoiceNo}`, bodyHtml, footerHtml);
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        let modalProductsList = [];

        async function openRequestModal(productId = null) {
            try {
                modalProductsList = await api('/products');

                const bodyHtml = `
    <div class="form-grid full">
      <div class="form-group"><label>Loại yêu cầu *</label>
        <select id="req-type">
          <option value="IMPORT">Nhập hàng</option>
          <option value="EXPORT">Xuất hàng</option>
        </select>
      </div>
      <div class="form-group"><label>Lý do</label><input id="req-reason" placeholder="Lý do tạo yêu cầu"/></div>
      
      <div class="form-group" style="margin-top: 8px;">
        <label style="color: var(--accent); font-weight: 600;">SKU *</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="req-quick-sku" placeholder="Nhập mã SKU hoặc quét Barcode" onkeyup="if(event.key==='Enter') handleRequestQuickSku(this.value)" autocomplete="off"/>
          <button class="btn btn-primary" onclick="handleRequestQuickSku(document.getElementById('req-quick-sku').value)" style="white-space: nowrap;">Thêm</button>
        </div>
      </div>
      
      <div style="margin-top: 15px;">
        <label>Danh sách sản phẩm *</label>
        <div id="req-items-list" style="margin-top: 8px; display: flex; flex-direction: column; gap: 8px;">
          <!-- Item rows will go here -->
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button class="btn btn-ghost btn-sm" onclick="addRequestItemRow()">
            <i class="fas fa-plus"></i> Thêm sản phẩm
          </button>
          <button class="btn btn-ghost btn-sm" onclick="openBarcodeScannerModal()" style="border-color: var(--accent); color: var(--accent);">
            <i class="fas fa-barcode"></i> Quét Barcode / SKU
          </button>
        </div>
      </div>
    </div>`;

                const footerHtml = `
      <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
      <button class="btn btn-success" onclick="saveStockRequest()"><i class="fas fa-check"></i> Xác nhận</button>`;

                openModal('Tạo yêu cầu Nhập/Xuất', bodyHtml, footerHtml);

                // Add first row automatically
                addRequestItemRow(productId);

                // Auto focus quick SKU input after modal opens
                setTimeout(() => {
                    const qInput = document.getElementById('req-quick-sku');
                    if (qInput) qInput.focus();
                }, 300);
            } catch (e) { toast(e.message, 'error'); }
        }

        async function handleRequestQuickSku(sku) {
            if (!sku) return;
            sku = sku.trim();
            const input = document.getElementById('req-quick-sku');
            try {
                const product = await api(`/products/sku/${sku}`);
                if (product) {
                    const rows = document.querySelectorAll('.req-item-row');
                    let foundRow = null;
                    for (const row of rows) {
                        const select = row.querySelector('.req-prod-select');
                        if (select && select.value == product.id) {
                            foundRow = row;
                            break;
                        }
                    }

                    if (foundRow) {
                        const qtyInput = foundRow.querySelector('.req-qty-input');
                        if (qtyInput) {
                            qtyInput.value = parseInt(qtyInput.value) + 1;
                        }
                    } else {
                        let emptyRow = null;
                        const allRows = Array.from(rows);
                        if (allRows.length > 0) {
                            const lastRow = allRows[allRows.length - 1];
                            const lastSelect = lastRow.querySelector('.req-prod-select');
                            if (lastSelect && !lastSelect.value) {
                                emptyRow = lastRow;
                            }
                        }

                        if (emptyRow) {
                            const selectEl = emptyRow.querySelector('.req-prod-select');
                            selectEl.value = product.id;
                        } else {
                            addRequestItemRow(product.id);
                        }
                    }

                    playBeepSound();
                    toast(`Đã thêm: ${product.name}`, 'success');
                    if (input) {
                        input.value = '';
                        input.focus();
                    }
                } else {
                    toast(`Không tìm thấy sản phẩm với SKU: ${sku}`, 'error');
                }
            } catch (e) {
                toast(`Lỗi tìm kiếm sản phẩm: ${sku}`, 'error');
            }
        }

        function addRequestItemRow(productId = null) {
            const container = document.getElementById('req-items-list');
            const rowId = 'req-row-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);

            const rowDiv = document.createElement('div');
            rowDiv.id = rowId;
            rowDiv.className = 'req-item-row';
            rowDiv.style.display = 'flex';
            rowDiv.style.gap = '8px';
            rowDiv.style.alignItems = 'center';

            rowDiv.innerHTML = `
          <select class="req-prod-select" style="flex: 2;">
            <option value="">— Chọn sản phẩm —</option>
            ${modalProductsList.map(p => `<option value="${p.id}" ${productId && p.id == productId ? 'selected' : ''}>${p.name} (Tồn: ${p.quantity})</option>`).join('')}
          </select>
          <input class="req-qty-input" type="number" min="1" value="1" style="flex: 1;" placeholder="SL"/>
          <button class="act-btn del" onclick="document.getElementById('${rowId}').remove()" style="height: 38px; width: 38px;"><i class="fas fa-trash"></i></button>
        `;

            container.appendChild(rowDiv);
        }

        async function saveStockRequest() {
            const type = document.getElementById('req-type').value;
            const reason = document.getElementById('req-reason').value;

            const rows = document.querySelectorAll('.req-item-row');
            const items = [];

            for (const row of rows) {
                const productId = row.querySelector('.req-prod-select').value;
                const quantity = parseInt(row.querySelector('.req-qty-input').value);

                if (!productId) {
                    toast('Vui lòng chọn sản phẩm cho tất cả các dòng!', 'error');
                    return;
                }
                if (isNaN(quantity) || quantity <= 0) {
                    toast('Số lượng sản phẩm phải lớn hơn 0!', 'error');
                    return;
                }

                items.push({ productId: parseInt(productId), quantity });
            }

            if (items.length === 0) {
                toast('Vui lòng thêm ít nhất một sản phẩm!', 'error');
                return;
            }

            const body = { type, reason, items };

            try {
                await api('/stock-requests', 'POST', body);
                toast('Tạo yêu cầu thành công!');
                closeModal();
                requests();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function approveRequest(id) {
            if (!confirm('Bạn có chắc chắn muốn duyệt yêu cầu này? Số lượng kho của sản phẩm sẽ thay đổi.')) return;
            try {
                await api(`/stock-requests/${id}/approve`, 'POST');
                toast('Duyệt yêu cầu thành công!');
                requests();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function rejectRequest(id) {
            if (!confirm('Bạn có chắc chắn muốn từ chối yêu cầu này?')) return;
            try {
                await api(`/stock-requests/${id}/reject`, 'POST');
                toast('Từ chối yêu cầu thành công!');
                requests();
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function downloadFile(path, filename) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(API + path, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.status === 401) {
                    logout();
                    return;
                }
                if (!res.ok) {
                    throw new Error('Không thể tải file');
                }
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (e) {
                toast('Lỗi khi tải file: ' + e.message, 'error');
            }
        }

        // ─────────────────────────────────────────────────────────────────────────────
        // BARCODE SCANNER
        // ─────────────────────────────────────────────────────────────────────────────
        let html5QrcodeScanner = null;
        let scannerTarget = 'request';

        function playBeepSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gainNode = context.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(context.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, context.currentTime); // 880Hz beep
                gainNode.gain.setValueAtTime(0.08, context.currentTime); // Soft volume

                oscillator.start();
                oscillator.stop(context.currentTime + 0.12); // Short beep duration (120ms)
            } catch (e) {
                console.warn("Could not play beep sound:", e);
            }
        }

        function openBarcodeScannerModal(target = 'request') {
            scannerTarget = target;
            document.getElementById('scanner-modal').classList.add('open');
            startCameraScan();
        }

        function closeBarcodeScanner() {
            stopCameraScan();
            document.getElementById('scanner-modal').classList.remove('open');
        }

        function startCameraScan() {
            if (html5QrcodeScanner) return;

            setTimeout(() => {
                const modal = document.getElementById('scanner-modal');
                if (!modal || !modal.classList.contains('open')) return;

                const container = document.getElementById('scanner-reader');
                if (!container || container.clientWidth === 0) {
                    setTimeout(startCameraScanActual, 100);
                } else {
                    startCameraScanActual();
                }
            }, 50);
        }

        function startCameraScanActual() {
            const modal = document.getElementById('scanner-modal');
            if (!modal || !modal.classList.contains('open')) return;
            if (html5QrcodeScanner) return;

            html5QrcodeScanner = new Html5Qrcode("scanner-reader");
            const config = {
                fps: 15,
                qrbox: (width, height) => {
                    // Immersive scanning square inside full view. Leave 60px margins.
                    const size = Math.min(width, height) - 60;
                    return { width: Math.max(160, size), height: Math.max(160, size) };
                }
            };

            // Try environment camera first (rear camera), fallback to user camera (front camera)
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                config,
                (decodedText, decodedResult) => {
                    handleBarcodeScanned(decodedText);
                },
                (errorMessage) => {
                    // Ignore scanner search noise
                }
            ).catch(err => {
                console.warn("Failed starting environment camera, trying user camera:", err);
                // Fallback to user facing camera (front camera)
                html5QrcodeScanner.start(
                    { facingMode: "user" },
                    config,
                    (decodedText, decodedResult) => {
                        handleBarcodeScanned(decodedText);
                    },
                    (errorMessage) => {
                        // Ignore noise
                    }
                ).catch(err2 => {
                    console.error("Camera scan start error:", err2);
                    toast("Không mở được camera: " + err2.message, "error");
                });
            });
        }

        function stopCameraScan() {
            if (html5QrcodeScanner) {
                const scannerRef = html5QrcodeScanner;
                html5QrcodeScanner = null; // Prevent double calls

                scannerRef.stop().then(() => {
                    forceStopCameraTracks();
                    const container = document.getElementById('scanner-reader');
                    if (container) container.innerHTML = '';
                }).catch(err => {
                    console.error("Failed to stop camera scanner:", err);
                    forceStopCameraTracks();
                    const container = document.getElementById('scanner-reader');
                    if (container) container.innerHTML = '';
                });
            } else {
                forceStopCameraTracks();
            }
        }

        function forceStopCameraTracks() {
            try {
                // Find all active video streams and stop their tracks to ensure camera light turns off
                const videos = document.querySelectorAll('video');
                videos.forEach(video => {
                    if (video.srcObject) {
                        const stream = video.srcObject;
                        const tracks = stream.getTracks();
                        tracks.forEach(track => track.stop());
                        video.srcObject = null;
                    }
                });
            } catch (e) {
                console.error("Error force stopping camera tracks:", e);
            }
        }

        async function handleBarcodeScanned(barcode) {
            closeBarcodeScanner();
            playBeepSound();
            toast("Đã quét mã: " + barcode);

            try {
                const product = await api(`/products/sku/${barcode}`);
                if (product) {
                    if (scannerTarget === 'search') {
                        const searchInput = document.getElementById('prod-search');
                        if (searchInput) {
                            searchInput.value = barcode;
                            products('all', barcode);
                        } else {
                            // Switch to products page, then search
                            showPage('products');
                            setTimeout(() => {
                                const input = document.getElementById('prod-search');
                                if (input) input.value = barcode;
                                products('all', barcode);
                            }, 250);
                        }
                    } else if (scannerTarget === 'movement') {
                        const selectEl = document.getElementById('sm-gen-pid');
                        if (selectEl) {
                            selectEl.value = product.id;
                            toast(`Đã chọn: ${product.name}`, 'success');
                        }
                    } else {
                        // Default 'request' target
                        const reqList = document.getElementById('req-items-list');
                        if (reqList) {
                            addRequestItemRow(product.id);
                        } else {
                            openRequestModal(product.id);
                        }
                        toast(`Đã thêm: ${product.name}`, 'success');
                    }
                } else {
                    toast(`Không tìm thấy sản phẩm với SKU: ${barcode}`, 'error');
                }
            } catch (e) {
                toast(`Lỗi tìm kiếm sản phẩm: ${e.message}`, 'error');
            }
        }

        // ─────────────────────────────────────────────────────────────────────────────
        // UTILS
        // ─────────────────────────────────────────────────────────────────────────────
        function showError(msg) {
            document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <i class="fas fa-circle-xmark" style="color:var(--danger);"></i>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;">Error</div>
      <div>${msg}</div>
    </div>`;
        }

        // Toggle sidebar layout (desktop collapses, mobile slides overlay)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.querySelector('.main');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
            } else {
                sidebar.classList.toggle('collapsed');
                main.classList.toggle('collapsed');
            }
        }

        // ── INIT ─────────────────────────────────────────────────────────────────────
        if (localStorage.getItem('token')) {
            const role = localStorage.getItem('role');
            if (role === 'ROLE_ADMIN') {
                showPage('users');
            } else if (role === 'ROLE_STAFF') {
                showPage('requests');
            } else {
                showPage('dashboard');
            }
        }
    </script>
</body>

</html>
